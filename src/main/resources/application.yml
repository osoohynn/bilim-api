spring:
  datasource:
    url: jdbc:mysql://localhost:3306/your_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: your_user
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # create / validate / none ? ??? ??
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  issuer: ${JWT_ISSUER}
  secret_key: ${JWT_SECRET_KEY}
  access_expiration_minutes: 15
  refresh_expiration_days: 14